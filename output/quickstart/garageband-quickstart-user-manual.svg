          <text x="30" y="132" font-size="21" font-weight="800" fill="#dbeafe">BPM, Key,</text><text x="30" y="163" font-size="21" font-weight="800" fill="#dbeafe">박자표를 먼저</text><text x="30" y="194" font-size="21" font-weight="800" fill="#dbeafe">정합니다.</text>
